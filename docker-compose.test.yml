# Test-Stack für E2E-Tests. Eigene Volumes/Ports, damit es parallel zum
# Dev-Stack laufen kann (Dev nutzt 80/3001/5432/21, Test nutzt andere Ports).
#
# Hochfahren:  docker compose -f docker-compose.test.yml up --build -d
# Abbau:       docker compose -f docker-compose.test.yml down -v

services:
  postgres-test:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: patzig
      POSTGRES_PASSWORD: patzig_secret
      POSTGRES_DB: bautagesbericht
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patzig -d bautagesbericht"]
      interval: 5s
      timeout: 5s
      retries: 5

  ftp-test:
    image: delfer/alpine-ftp-server
    restart: unless-stopped
    environment:
      USERS: "ftpuser|ftppass|/home/ftpuser|10000"
      ADDRESS: ftp-test
      MIN_PORT: 21100
      MAX_PORT: 21110
    ports:
      - "2121:21"
      - "21100-21110:21100-21110"
    volumes:
      - ./ftp-seed:/home/ftpuser

  server-test:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3002:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://patzig:patzig_secret@postgres-test:5432/bautagesbericht
      JWT_SECRET: test-jwt-secret-AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA
      JWT_REFRESH_SECRET: test-refresh-secret-BBBBBBBBBBBBBBBBBBBBBBBBBBBBBBBB
      ENCRYPTION_KEY: test-encryption-key-32bytes!!!!!!
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123
      UPLOADS_DIR: /app/uploads
      FTP_HOST: ftp-test
      FTP_PORT: "21"
      FTP_USER: ftpuser
      FTP_PASSWORD: ftppass
    volumes:
      - uploads-test:/app/uploads
    depends_on:
      postgres-test:
        condition: service_healthy
      ftp-test:
        condition: service_started

  client-test:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - server-test

volumes:
  uploads-test:
