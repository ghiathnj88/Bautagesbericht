services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-patzig}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-bautagesbericht}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-patzig} -d ${DB_NAME:-bautagesbericht}"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    image: ghcr.io/ghiathnj88/bautagesbericht-server:latest
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-patzig}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-bautagesbericht}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      UPLOADS_DIR: /app/uploads
      FTP_HOST: ${FTP_HOST}
      FTP_PORT: ${FTP_PORT:-21}
      FTP_USER: ${FTP_USER}
      FTP_PASSWORD: ${FTP_PASSWORD}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  client:
    image: ghcr.io/ghiathnj88/bautagesbericht-client:latest
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
