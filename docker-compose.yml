version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: patzig
      POSTGRES_PASSWORD: patzig_secret
      POSTGRES_DB: bautagesbericht
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U patzig -d bautagesbericht"]
      interval: 5s
      timeout: 5s
      retries: 5

  ftp:
    image: delfer/alpine-ftp-server
    restart: unless-stopped
    environment:
      USERS: "ftpuser|ftppass|/home/ftpuser|10000"
      ADDRESS: ftp
      MIN_PORT: 21000
      MAX_PORT: 21010
    ports:
      - "21:21"
      - "21000-21010:21000-21010"
    volumes:
      - ./ftp-seed:/home/ftpuser

  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://patzig:patzig_secret@postgres:5432/bautagesbericht
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-change-me-in-production-refresh}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-change-me-32-bytes-in-prod!!!!!}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      UPLOADS_DIR: /app/uploads
      FTP_HOST: ${FTP_HOST:-ftp}
      FTP_PORT: ${FTP_PORT:-21}
      FTP_USER: ${FTP_USER:-ftpuser}
      FTP_PASSWORD: ${FTP_PASSWORD:-ftppass}
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      ftp:
        condition: service_started

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server

volumes:
  pgdata:
  uploads:
